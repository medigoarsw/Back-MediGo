name: CI — MediGo Backend

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: medigo_test
          POSTGRES_USER: medigo
          POSTGRES_PASSWORD: medigo123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compilar proyecto
        run: mvn clean compile

      - name: Ejecutar Tests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/medigo_test
          SPRING_DATASOURCE_USERNAME: medigo
          SPRING_DATASOURCE_PASSWORD: medigo123
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
          SPRING_PROFILES_ACTIVE: test
        run: mvn test

      - name: Publicar reporte de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/
