# ======================================================================
# CONFIGURACIÓN PARA CI: Base de datos PostgreSQL
# ======================================================================
# Usado solo en GitHub Actions cuando ejecuta tests contra PostgreSQL
# El workflow CI proporciona la BD via Docker Compose
# ======================================================================

# Base de datos PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/medigo_test}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:medigo}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:medigo123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA con PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# Deshabilitar Liquibase
spring.liquibase.enabled=false

# WebSocket para pruebas
spring.websocket.enabled=true
