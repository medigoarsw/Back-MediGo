# ======================================================================
# CONFIGURACIÓN DE TESTS: Base de datos en memoria H2
# ======================================================================
# Usamos H2 en tests para:
# - No depender de servicios externos
# - Tests rápidos y aislados
# - Cambios de BD no rompen tests
# 
# Para desarrollo/producción: usa PostgreSQL (application-local.properties)
# ======================================================================

# Base de datos H2 en memoria
spring.datasource.url=jdbc:h2:mem:medigo_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA con H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 console (solo para debugging)
spring.h2.console.enabled=true

# Redis (mock/deshabilitado en tests)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Deshabilitar Liquibase
spring.liquibase.enabled=false

# WebSocket para pruebas
spring.websocket.enabled=true