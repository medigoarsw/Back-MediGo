# Configuración de base de datos PostgreSQL para tests (CI proporciona credenciales)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/medigo_test}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:medigo}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:medigo123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Deshabilitar Liquibase
spring.liquibase.enabled=false

# Deshabilitar Redis
spring.autoconfigure.exclude=\
org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Deshabilitar WebSocket para pruebas
spring.websocket.enabled=false