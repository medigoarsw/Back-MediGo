# Perfil de pruebas unitarias/integración (ActiveProfiles("test"))
# Evita dependencias externas durante tests (determinismo en CI).
app.security.password-breach-check-enabled=false
app.security.password-breach-check-timeout-ms=500
# ======================================================================
# CONFIGURACIÓN DE TESTS: Base de datos en memoria H2
# ======================================================================
# Usamos H2 en tests para:
# - Tests rápidos y aislados (sin dependencias externas)
# - No romper tests si cambia la BD
# 
# Para CI: usa application-ci.properties (PostgreSQL)
# Para desarrollo: usa application-local.properties (PostgreSQL)
# ======================================================================

# Base de datos H2 en memoria
spring.datasource.url=jdbc:h2:mem:medigo_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA con H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Garantiza que Hibernate cree el schema ANTES de que Spring ejecute data.sql
spring.jpa.defer-datasource-initialization=true

# H2 console (solo para debugging)
spring.h2.console.enabled=true

# Redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# Deshabilitar Liquibase
spring.liquibase.enabled=false

# WebSocket para pruebas
spring.websocket.enabled=true