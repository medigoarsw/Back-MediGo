spring.application.name=MediGo
 
# Base de datos — Supabase Connection Pooler (evita bloqueo del puerto 5432)
# Importante para PgBouncer: desactivar server-prepared statements
spring.datasource.url=jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:6543/postgres?preparedStatementCacheQueries=0&preparedStatementCacheSizeMB=0&useServerPrepStmts=false&rewriteBatchedStatements=true
spring.datasource.username=postgres.rgojxnppioltgrexlxbs
spring.datasource.password=%ARSW2026Ezequiel
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# HikariCP Configuration - Critical for PgBouncer compatibility
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.leak-detection-threshold=60000

# Hibernate Configuration - Disable prepared statement caching
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=true
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=100
 
# JPA
spring.jpa.show-sql=true

# Logging para debugging
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.http.converter=DEBUG
logging.level.com.fasterxml.jackson=DEBUG
logging.level.edu.escuelaing.arsw=DEBUG

# Jackson Serialization Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.write-bigdecimal-as-plain=true
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.indent-output=false
spring.jackson.serialization.write-empty-json-arrays=true

# HttpMessageConverters - Ensure full buffering of responses
spring.mvc.async.request-timeout=30000
server.tomcat.max-http-form-post-size=10485760
 
# Liquibase — desactivado por ahora (ya creamos las tablas manual)
spring.liquibase.enabled=false
 
# Redis (Upstash)
spring.data.redis.url=rediss://default:gQAAAAAAAV4AAAIncDFmOTA3YzU5ZjY0YzQ0MjVkOTlmNGJjN2U2YTY5ZTAyY3AxODk2MDA@popular-lark-89600.upstash.io:6379
 
# Puerto
server.port=8080

# CORS permitido para frontend (MVP local + deploy)
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,https://frontmedigo.vercel.app

# Seguridad de contraseñas
app.security.password-breach-check-enabled=true
app.security.password-breach-check-timeout-ms=2000
