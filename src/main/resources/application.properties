spring.application.name=MediGo
# Set to true only for extreme debugging (disables all security checks)
app.security.open-all-endpoints=false

# Base de datos — Supabase Connection Pooler (PgBouncer modo transacción, puerto 6543)
# prepareThreshold=0 desactiva los server-side prepared statements (requerido por PgBouncer)
spring.datasource.url=jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:6543/postgres?prepareThreshold=0
spring.datasource.username=postgres.rgojxnppioltgrexlxbs
spring.datasource.password=%ARSW2026Ezequiel
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
# Hibernate: desactivar prepared statements del lado del servidor (compatible con PgBouncer)
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JPA
spring.jpa.show-sql=true
 
# Liquibase — desactivado por ahora (ya creamos las tablas manual)
spring.liquibase.enabled=false
 
