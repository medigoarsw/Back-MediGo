spring.application.name=MediGo

# Base de datos — Supabase Connection Pooler (evita bloqueo del puerto 5432)
# Las credenciales vienen de variables de entorno (GitHub Secrets en CI)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-sa-east-1.pooler.supabase.com:6543/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.njsemkjclsyfilecvgat}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# JPA
spring.jpa.show-sql=true

# Liquibase — desactivado por ahora (ya creamos las tablas manual)
spring.liquibase.enabled=false

# Redis (lo conectamos después)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Puerto
server.port=8080

# ===================== SWAGGER / OPENAPI =====================
# Ruta para acceder a Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html

# Habilitar Swagger UI
springdoc.swagger-ui.enabled=true

# Mostrar información del servidor en Swagger
springdoc.swagger-ui.show-extensions=true

# Ordenar endpoints por tags
springdoc.swagger-ui.tags-sorter=alpha

# Ordenar operaciones alfabéticamente
springdoc.swagger-ui.operations-sorter=alpha

# Mostrar modelos/schemas
springdoc.swagger-ui.doc-expansion=list

# URL de OpenAPI JSON
# http://localhost:8080/v3/api-docs
# http://localhost:8080/v3/api-docs.yaml